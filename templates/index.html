<!DOCTYPE html>
<html>
<head>
<title>Recipe Page</title>

<style>

body{
    background:#F4E8D0;
    margin:0;
    font-family:sans-serif;
    color:#7A5A3A;
}

h1,h2{
    font-family:Georgia, serif;
}

.navbar{
    display:flex;
    justify-content:center;
    gap:60px;
    padding:30px;
}

.navbar a{
    text-decoration:none;
    color:#7A5A3A;
}

.hero{
    text-align:center;
    padding:50px;
}

.hero h1{
    font-size:70px;
    margin-bottom:20px;
}

.btn{
    background:#3C3129;
    color:white;
    padding:15px 30px;
    text-decoration:none;
    border-radius:25px;
}

.recipe-grid{
    width:90%;
    margin:auto;

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));

    gap:30px;
}

.card{
    background:#F8EEDC;

    padding:25px;

    border-radius:25px;

    text-align:center;

    box-shadow:0 10px 20px rgba(0,0,0,.15);
}

.card img{
    width:160px;
}

.card h2{
    font-size:32px;
}

</style>

</head>
<body>

<div class="hero">

<h1>
Welcome to My Recipe Page
</h1>
<br>
<p>
Discover delicious homemade recipes crafted with love.
</p>

<br><br>

<a class="btn"
href="/recipe/add">
Add Recipe
</a>

</div>


<div class="recipe-grid">

{% for recipe in recipes %}

<div class="card">

<img
src="/{{recipe.image_path}}"
width="220">

<h2>
{{recipe.title}}
</h2>

<p>
{{recipe.description}}
</p>

<br>

<a class="btn"
href="/recipe/{{recipe.id}}">
View Recipe

</a>

&nbsp;&nbsp;

<a class="btn"
href="/recipe/delete/{{recipe.id}}"
onclick="return confirm('Delete this recipe?')">
Delete
</a>

</div>

{% endfor %}

</div>
<br><br>
<br><br>
</body>
</html>
