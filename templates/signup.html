<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Segoe UI;
        }

        body{
            background:#0d0b1e;
            color:white;

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:450px;

            background:#1b1733;

            padding:40px;

            border-radius:20px;

            box-shadow:
            0 0 20px rgba(255,0,255,.2);
        }

        h1{
            text-align:center;
            margin-bottom:30px;

            color:#ff6ec7;
        }

        label{
            display:block;
            margin-bottom:8px;

            color:#d4d4d4;
        }

        input{
            width:100%;

            padding:15px;

            margin-bottom:20px;

            border:none;

            border-radius:12px;

            background:#29254a;

            color:white;

            font-size:16px;
        }

        input:focus{
            outline:none;

            border:2px solid #ff6ec7;
        }

        button{
            width:100%;

            padding:15px;

            border:none;

            border-radius:12px;

            background:#ff6ec7;

            color:white;

            font-size:17px;

            cursor:pointer;

            transition:.3s;
        }

        button:hover{
            background:#ff4cb8;
            transform:scale(1.02);
        }

        p{
            margin-top:20px;

            text-align:center;
        }

        a{
            color:#ff6ec7;

            text-decoration:none;
        }

        a:hover{
            color:white;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Create Account</h1>

    <form action="/signup" method="post">

        <label>Username</label>

        <input
                type="text"
                name="username"
                required
        >

        <label>Email</label>

        <input
                type="email"
                name="email"
                required
        >

        <label>Password</label>

        <input
                type="password"
                name="password"
                required
        >

        <button type="submit">
            Create Account
        </button>

    </form>

    <p>
        Already have an account?
        <a href="/login">
            Login
        </a>
    </p>

</div>

</body>
</html>
